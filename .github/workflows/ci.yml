name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck + Build (api + web)
    runs-on: ubuntu-latest

    env:
      # Build-time only — prisma generate doesn't connect; npm ci runs the
      # api workspace's postinstall hook so the schema must be parseable.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_db
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Generate Next.js route types (api)
        run: npm exec --workspace @iconforge/api -- next typegen

      - name: Generate Next.js route types (web)
        run: npm exec --workspace @iconforge/web -- next typegen

      - name: Typecheck
        run: |
          npm exec --workspace @iconforge/api -- tsc --noEmit
          npm exec --workspace @iconforge/web -- tsc --noEmit

      - name: Build api
        run: npm run build:api

      - name: Build web
        run: npm run build:web
