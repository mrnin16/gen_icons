name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-flight run for the same ref when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck · Build
    runs-on: ubuntu-latest

    # Build-time only needs prisma generate (no real DB connection); set a
    # dummy URL so prisma.config.ts loads cleanly.
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_db
      # Disable Next.js telemetry in CI for a quieter, slightly faster build.
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Generate Next.js route types
        run: npx next typegen

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
